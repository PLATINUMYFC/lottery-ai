name: auto update

on:
  schedule:
    - cron: "0 10 * * 2,5"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: curl -o loto6.json https://raw.githubusercontent.com/datasets/lottery-japan/master/loto6.json
      - run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "update"
          git push
