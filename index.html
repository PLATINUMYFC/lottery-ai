<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>宝くじAI</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --bg1:#05070d; --bg2:#0b1324;
  --glass: rgba(15,23,42,.7);
  --border: rgba(255,255,255,.08);
  --neon:#00f7ff; --blue:#3b82f6; --violet:#8b5cf6;
  --text:#e6f2ff; --muted:#9fb3c8;
}

*{box-sizing:border-box}
body{
  margin:0; color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:
    radial-gradient(1000px 600px at 10% -10%, #12204a 0%, transparent 60%),
    radial-gradient(800px 500px at 110% 10%, #0a3a4a 0%, transparent 60%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
}

/* Header */
.header{
  position:sticky; top:0;
  padding:16px 12px;
  text-align:center; font-weight:700; letter-spacing:.08em;
  background:linear-gradient(180deg, rgba(15,23,42,.95), rgba(15,23,42,.6));
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--border);
}

/* Fortune */
#fortune{
  margin:12px;
  padding:12px 14px;
  border-radius:14px;
  background:var(--glass);
  backdrop-filter: blur(12px);
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.03);
  text-align:center;
}
.f-badge{
  display:inline-block; padding:6px 10px; border-radius:999px;
  font-size:12px; margin-left:8px;
  background:linear-gradient(135deg,var(--neon),var(--blue));
  color:#000; font-weight:700;
}

/* Buttons */
.btn{
  width:92%;
  margin:10px auto;
  display:block;
  padding:14px 16px;
  border-radius:16px;
  border:none;
  font-weight:700; letter-spacing:.04em;
  background:linear-gradient(135deg,var(--neon),var(--blue));
  color:#00131a;
  box-shadow:0 12px 28px rgba(0,247,255,.25);
  transition:transform .08s ease, box-shadow .2s ease, filter .2s;
}
.btn:active{ transform:scale(.97); filter:saturate(1.2); }

/* Cards */
.card{
  margin:14px;
  padding:14px;
  border-radius:18px;
  background:var(--glass);
  backdrop-filter: blur(12px);
  border:1px solid var(--border);
  box-shadow:0 14px 40px rgba(0,0,0,.45);
}
.card-title{
  font-size:13px; color:var(--muted);
  margin-bottom:8px; letter-spacing:.08em;
}

/* Grid rows */
.row{
  display:flex; flex-wrap:wrap; justify-content:center;
  gap:10px; margin:8px 0 12px;
}

/* Balls */
.ball{
  width:46px; height:46px; line-height:46px;
  border-radius:50%;
  text-align:center; font-weight:800;
  letter-spacing:.03em;
  color:#00131a;
  background:linear-gradient(135deg,#a5f3fc,#60a5fa);
  box-shadow:
    0 8px 18px rgba(0,0,0,.5),
    inset 0 2px 6px rgba(255,255,255,.5);
  opacity:0; transform:translateY(10px) scale(.9);
  animation:pop .45s ease forwards;
}
.ball.low { background:linear-gradient(135deg,#a7f3d0,#34d399); }
.ball.mid { background:linear-gradient(135deg,#a5f3fc,#60a5fa); }
.ball.high{ background:linear-gradient(135deg,#c4b5fd,#8b5cf6); }

/* delay util */
.delay-1{animation-delay:.05s}
.delay-2{animation-delay:.1s}
.delay-3{animation-delay:.15s}
.delay-4{animation-delay:.2s}
.delay-5{animation-delay:.25s}
.delay-6{animation-delay:.3s}
.delay-7{animation-delay:.35s}
.delay-8{animation-delay:.4s}
.delay-9{animation-delay:.45s}
.delay-10{animation-delay:.5s}

/* Reason chips */
.chips{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.chip{
  font-size:11px; color:#cfe6ff;
  padding:6px 8px; border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

/* Animations */
@keyframes pop{
  to{ opacity:1; transform:translateY(0) scale(1); }
}
</style>
</head>

<body>

<h1 class="header">宝くじAI</h1>

<div id="fortune">読み込み中...</div>

<button class="btn" onclick="run('loto6')">ロト6</button>
<button class="btn" onclick="run('loto7')">ロト7</button>
<button class="btn" onclick="run('num4')">ナンバーズ4</button>

<div id="out"></div>

<script src="./script.js" defer></script>
</body>
</html>
